name: Build and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: peacesheep
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t peacesheep/personal-page-be:latest \
            -t peacesheep/personal-page-be:${GITHUB_SHA} \
            .

      - name: Push Docker image
        run: |
          docker push peacesheep/personal-page-be:latest
          docker push peacesheep/personal-page-be:${GITHUB_SHA}
