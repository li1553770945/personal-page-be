name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate Docker Hub token
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          if [ -z "${DOCKER_TOKEN}" ]; then
            echo "::error::Missing repository secret DOCKER_TOKEN. Add a Docker Hub access token in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: peacesheep
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t peacesheep/personal-page-be:latest \
            -t peacesheep/personal-page-be:${GITHUB_SHA} \
            .

      - name: Push Docker image
        run: |
          docker push peacesheep/personal-page-be:latest
          docker push peacesheep/personal-page-be:${GITHUB_SHA}
